# ==================== 0. 系统底层 ====================
system:
  permission_denied: "🔒 哎呀，这个指令只有管理员大人才能使用哦~"
  cooldown: "💨 呼... {nickname}小友，动作太快啦，灵力还在恢复中..."
  spam_warning: "⚠ 警告：检测到灵力波动异常，请不要刷屏哦！"
  error_generic: "😵 呜哇... 秃贝的灵力回路好像打结了... (报错: {err})"
  not_registered: "📋 使用此功能前需要先建立灵力档案~\n👉 发送 /登记 开始录入"


# ==================== 1. 行政系统 ====================
admin:
