# ================================================================
# 晋宁会馆·秃贝五边形 3.0 | 群分级配置
# ================================================================
#
# 三级群分类：
#   core_groups   - Tier 0 核心群（全功能开放）
#   allied_groups - Tier 1 联盟群（大部分功能开放，馆外身份）
#   未列出的群    - Tier 2 公开群（仅趣味功能 + AI聊天）
#
# 核心群子类型：
#   main  - 会馆主群（主要活动场所）
#   admin - 管理组官群（管理指令可用）
#   debug - 调试群（调试指令可用，日报不统计）
# ================================================================

# ==================== Tier 0: 核心群 ====================
core_groups:
  564234162:
    name: "晋宁会馆主群"
    type: "main"

  210383914:
    name: "管理组官群"
    type: "admin"

  805930992:
    name: "功能调试群"
    type: "debug"

  # 如有更多主群，在此添加：
  # 123456789:
  #   name: "晋宁会馆二群"
  #   type: "main"


# ==================== Tier 1: 联盟/小黑群 ====================
